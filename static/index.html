<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Health Benefits Explainer</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #388bfd33;
      --user-msg: #238636;
      --bot-msg: #1a2332;
      --error: #f85149;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    header p {
      margin: 0.25rem 0 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 48rem;
      margin: 0 auto;
      width: 100%;
    }
    .msg {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-msg);
      border: 1px solid var(--border);
    }
    .msg .meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }
    .msg.error {
      align-self: center;
      background: rgba(248, 81, 73, 0.15);
      border-color: var(--error);
      color: #f85149;
    }
    .typing {
      align-self: flex-start;
      padding: 0.75rem 1rem;
      background: var(--bot-msg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
    }
    .typing span {
      animation: dot 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }
    #form-wrap {
      padding: 1rem 1.5rem 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #form-wrap form {
      max-width: 48rem;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
    }
    #input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    #input:focus {
      outline: none;
      border-color: var(--accent);
    }
    #input::placeholder {
      color: var(--text-muted);
    }
    button[type="submit"] {
      padding: 0.75rem 1.25rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover {
      filter: brightness(1.1);
    }
    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <h1>Health Benefits Explainer</h1>
    <p>Ask questions about your health insurance policy. Answers are based on your plan document.</p>
  </header>
  <div id="messages"></div>
  <div id="form-wrap">
    <form id="chat-form">
      <input type="text" id="input" name="question" placeholder="e.g. Is MRI covered? What’s my deductible?" autocomplete="off" />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(content, role, usedSearch) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const meta = role === 'bot' && usedSearch ? '<div class="meta">Used general search for this answer.</div>' : '';
      div.innerHTML = escapeHtml(content) + meta;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addError(msg) {
      const div = document.createElement('div');
      div.className = 'msg error';
      div.textContent = msg;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = 'Thinking<span>.</span><span>.</span><span>.</span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function escapeHtml(s) {
      const p = document.createElement('p');
      p.textContent = s;
      return p.innerHTML;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = (input.value || '').trim();
      if (!question) return;

      addMessage(question, 'user');
      input.value = '';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json().catch(() => ({}));
        hideTyping();
        if (!res.ok) {
          addError(data.detail || data.message || 'Something went wrong. Try again.');
          return;
        }
        addMessage(data.answer || '', 'bot', data.used_public_search);
      } catch (err) {
        hideTyping();
        addError('Network error. Check your connection and try again.');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
